apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: registry.gitlab.com/nabilou-anoir/projet-tutore-rh/frontend:20260401-amd64
          ports:
            - containerPort: 80
          env:
            - name: NODE_ENV
              value: production
      imagePullSecrets:
        - name: regcred