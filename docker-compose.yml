version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8989:8989"
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    environment:
      - FIREBASE_CREDENTIALS_FILE=/app/firebase-service-account.json
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
